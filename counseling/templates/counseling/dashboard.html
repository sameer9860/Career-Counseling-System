<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Career Counseling Dashboard</title>
</head>
<body>
    <h2>Career Counseling Dashboard</h2>
    <table border="1" cellpadding="6">
        <tr>
            <th>Career Path</th>
            <th>Number of Students</th>
        </tr>
        {% for trend in trends %}
            <tr>
                <td>{{ trend.suggestion }}</td>
                <td>{{ trend.count }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="2">No data yet.</td>
            </tr>
        {% endfor %}
    </table>

    <p><a href="{% url 'counseling_form' %}">Back to Counseling Form</a></p>
</body>
</html>
